<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prayer Knowledge Wheel</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Comfortaa:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #f0eaf8;
    --bg2:       #e8f0fb;
    --surface:   #ffffff;
    --surface2:  #f7f2fd;
    --border:    #ddd4ef;
    --txt:       #3d2f5c;
    --txt2:      #7a6b9a;
    --accent1:   #b39ddb;
    --accent2:   #90caf9;
    --accent3:   #a5d6a7;
    --accent4:   #f48fb1;
    --accent5:   #ffe082;
    --accent6:   #80deea;
    --correct:   #66bb6a;
    --wrong:     #ef5350;
    --gold:      #9575cd;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: linear-gradient(135deg, var(--bg) 0%, var(--bg2) 100%);
    min-height: 100vh;
    font-family: 'Nunito', sans-serif;
    color: var(--txt);
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Soft blob background */
  .blobs { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
  .blob {
    position:absolute;
    border-radius:50%;
    filter:blur(70px);
    opacity:0.35;
    animation: blobDrift 12s ease-in-out infinite;
  }
  .blob1 { width:500px;height:500px;background:#d1b3f5;top:-150px;left:-150px;animation-delay:0s; }
  .blob2 { width:400px;height:400px;background:#b3d4f5;bottom:-100px;right:-100px;animation-delay:-5s; }
  .blob3 { width:300px;height:300px;background:#f5b3d4;top:40%;right:10%;animation-delay:-8s; }
  .blob4 { width:250px;height:250px;background:#b3f5d4;top:20%;left:5%;animation-delay:-3s; }
  @keyframes blobDrift {
    0%,100%{transform:translate(0,0) scale(1);}
    33%{transform:translate(20px,-20px) scale(1.05);}
    66%{transform:translate(-15px,15px) scale(0.97);}
  }

  /* Floating sparkles */
  .sparkle {
    position:fixed;
    pointer-events:none;
    z-index:0;
    font-size:1rem;
    animation:sparkleDrift linear infinite;
    opacity:0;
  }
  @keyframes sparkleDrift {
    0%{opacity:0;transform:translateY(0) scale(0.5);}
    20%{opacity:0.6;}
    80%{opacity:0.4;}
    100%{opacity:0;transform:translateY(-100vh) scale(1.2);}
  }

  .game-container {
    position:relative;
    z-index:1;
    width:100%;
    max-width:820px;
    padding:24px 16px 48px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:22px;
  }

  /* ── HEADER ── */
  .header { text-align:center; }
  .header h1 {
    font-family:'Comfortaa', cursive;
    font-size:clamp(1.3rem,4vw,2rem);
    font-weight:700;
    color: var(--txt);
    letter-spacing:1px;
  }
  .header h1 span {
    background:linear-gradient(135deg,#9575cd,#64b5f6,#e57eb3);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
    background-size:200% auto;
    animation:hGrad 4s linear infinite;
  }
  @keyframes hGrad{0%{background-position:0%}100%{background-position:200%}}
  .header p {
    font-size:0.85rem;
    color:var(--txt2);
    letter-spacing:3px;
    text-transform:uppercase;
    margin-top:4px;
  }

  /* ── SCORE BAR ── */
  .score-bar {
    display:flex;
    gap:0;
    background:var(--surface);
    border:1.5px solid var(--border);
    border-radius:20px;
    padding:0;
    overflow:hidden;
    box-shadow:0 4px 20px rgba(149,117,205,0.12);
  }
  .score-item {
    text-align:center;
    padding:10px 26px;
    border-right:1.5px solid var(--border);
  }
  .score-item:last-child { border-right:none; }
  .score-label {
    font-size:0.65rem;
    letter-spacing:2px;
    text-transform:uppercase;
    color:var(--txt2);
    font-weight:700;
  }
  .score-val {
    font-family:'Comfortaa',cursive;
    font-size:1.5rem;
    font-weight:700;
    color:var(--txt);
    margin-top:1px;
  }
  .score-val.correct { color:var(--correct); }
  .score-val.wrong   { color:var(--wrong); }

  /* ── WHEEL SECTION ── */
  .wheel-section {
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:18px;
  }

  .wheel-wrapper {
    position:relative;
    display:flex;
    justify-content:center;
    align-items:center;
  }

  /* Soft glow ring */
  .wheel-glow {
    position:absolute;
    width:340px;height:340px;
    border-radius:50%;
    background:conic-gradient(#b39ddb,#90caf9,#a5d6a7,#f48fb1,#ffe082,#80deea,#b39ddb);
    animation:ringRot 8s linear infinite;
    opacity:0.4;
    filter:blur(10px);
  }
  @keyframes ringRot{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

  .wheel-ring {
    position:absolute;
    width:326px;height:326px;
    border-radius:50%;
    border:2.5px solid rgba(179,157,219,0.4);
    box-shadow:0 0 30px rgba(149,117,205,0.1),inset 0 0 20px rgba(144,202,249,0.05);
  }

  canvas#wheel {
    position:relative;
    z-index:2;
    border-radius:50%;
    filter:drop-shadow(0 8px 30px rgba(149,117,205,0.25));
  }

  .pointer {
    position:absolute;
    top:-4px;
    left:50%;
    transform:translateX(-50%);
    z-index:10;
    width:0;height:0;
    border-left:14px solid transparent;
    border-right:14px solid transparent;
    border-top:42px solid #9575cd;
    filter:drop-shadow(0 0 8px rgba(149,117,205,0.6));
    animation:pPulse 2.5s ease-in-out infinite;
  }
  @keyframes pPulse{
    0%,100%{filter:drop-shadow(0 0 6px rgba(149,117,205,0.5));}
    50%{filter:drop-shadow(0 0 18px rgba(149,117,205,0.9));}
  }

  .wheel-hub {
    position:absolute;
    width:56px;height:56px;
    background:linear-gradient(135deg,#ede7f6,#d1c4e9);
    border-radius:50%;
    z-index:10;
    border:3px solid rgba(255,255,255,0.8);
    box-shadow:0 4px 20px rgba(149,117,205,0.35);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:1.3rem;
    animation:hubPulse 3s ease-in-out infinite;
  }
  @keyframes hubPulse{
    0%,100%{box-shadow:0 4px 15px rgba(149,117,205,0.3);}
    50%{box-shadow:0 4px 28px rgba(149,117,205,0.55);}
  }

  /* ── TOPIC DISPLAY ── */
  .topic-display {
    padding:12px 28px;
    border-radius:50px;
    background:var(--surface);
    border:1.5px solid var(--border);
    font-size:0.95rem;
    letter-spacing:0.5px;
    color:var(--gold);
    text-align:center;
    font-weight:800;
    min-height:44px;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 4px 16px rgba(149,117,205,0.13);
    max-width:480px;
    width:100%;
    transition:all 0.4s;
  }

  /* ── SPIN BUTTON ── */
  .spin-btn {
    position:relative;
    padding:15px 54px;
    font-family:'Comfortaa',cursive;
    font-size:1rem;
    font-weight:700;
    letter-spacing:1.5px;
    color:#fff;
    background:linear-gradient(135deg,#9575cd,#7986cb,#64b5f6);
    background-size:200% auto;
    border:none;
    border-radius:50px;
    cursor:pointer;
    box-shadow:0 6px 24px rgba(149,117,205,0.4);
    transition:transform 0.15s,box-shadow 0.15s;
    animation:btnGrad 3s linear infinite;
    overflow:hidden;
  }
  @keyframes btnGrad{0%{background-position:0%}100%{background-position:200%}}
  .spin-btn::before {
    content:'';
    position:absolute;
    top:-50%;left:-60%;
    width:40%;height:200%;
    background:rgba(255,255,255,0.25);
    transform:skewX(-20deg);
    animation:btnGlare 3s ease-in-out infinite;
  }
  @keyframes btnGlare{0%,100%{left:-60%}60%{left:130%}}
  .spin-btn:hover:not(:disabled) {
    transform:translateY(-3px) scale(1.04);
    box-shadow:0 10px 32px rgba(149,117,205,0.55);
  }
  .spin-btn:active:not(:disabled){transform:scale(0.97);}
  .spin-btn:disabled{opacity:0.5;cursor:not-allowed;}

  /* ── LEGEND ── */
  .legend {
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    justify-content:center;
    max-width:560px;
  }
  .legend-item {
    display:flex;
    align-items:center;
    gap:6px;
    font-size:0.72rem;
    color:var(--txt2);
    font-weight:700;
    background:var(--surface);
    border:1px solid var(--border);
    border-radius:20px;
    padding:4px 12px;
  }
  .legend-dot {
    width:10px;height:10px;
    border-radius:50%;
    flex-shrink:0;
  }

  /* ── MODAL ── */
  .modal-overlay {
    display:none;
    position:fixed;
    inset:0;
    background:rgba(61,47,92,0.3);
    backdrop-filter:blur(10px);
    z-index:100;
    align-items:center;
    justify-content:center;
    padding:20px;
  }
  .modal-overlay.active{display:flex;}

  .modal {
    background:var(--surface);
    border:1.5px solid var(--border);
    border-radius:28px;
    padding:36px 30px;
    max-width:580px;
    width:100%;
    position:relative;
    box-shadow:0 20px 60px rgba(149,117,205,0.2),0 4px 20px rgba(0,0,0,0.05);
    animation:modalIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
    max-height:90vh;
    overflow-y:auto;
  }
  @keyframes modalIn{
    from{opacity:0;transform:scale(0.8) translateY(30px);}
    to{opacity:1;transform:scale(1) translateY(0);}
  }

  .modal-topic-badge {
    display:inline-block;
    padding:5px 18px;
    border-radius:50px;
    font-size:0.72rem;
    font-weight:800;
    letter-spacing:2px;
    text-transform:uppercase;
    color:#fff;
    margin-bottom:18px;
  }

  .modal h2 {
    font-size:clamp(1rem,3vw,1.2rem);
    font-weight:800;
    color:var(--txt);
    line-height:1.55;
    margin-bottom:26px;
  }

  .options-grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-bottom:22px;
  }

  .option-btn {
    padding:13px 14px;
    background:var(--surface2);
    border:1.5px solid var(--border);
    border-radius:16px;
    color:var(--txt);
    font-family:'Nunito',sans-serif;
    font-size:0.9rem;
    font-weight:700;
    cursor:pointer;
    text-align:left;
    line-height:1.4;
    transition:all 0.2s;
    display:flex;
    align-items:flex-start;
    gap:8px;
  }
  .option-btn:hover:not(:disabled) {
    background:#ede7f6;
    border-color:var(--accent1);
    transform:translateY(-2px);
    box-shadow:0 4px 14px rgba(149,117,205,0.15);
  }
  .option-btn.correct {
    background:#e8f5e9;
    border-color:var(--correct);
    box-shadow:0 4px 16px rgba(102,187,106,0.25);
  }
  .option-btn.wrong {
    background:#fce4ec;
    border-color:var(--wrong);
    box-shadow:0 4px 16px rgba(239,83,80,0.2);
  }
  .option-btn.reveal {
    background:#e8f5e9;
    border-color:rgba(102,187,106,0.5);
  }

  .option-letter {
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:24px;height:24px;
    min-width:24px;
    background:var(--border);
    border-radius:8px;
    font-size:0.75rem;
    font-weight:800;
    color:var(--txt2);
    flex-shrink:0;
    transition:all 0.2s;
  }
  .option-btn.correct .option-letter{background:#a5d6a7;color:#2e7d32;}
  .option-btn.wrong   .option-letter{background:#f48fb1;color:#c62828;}
  .option-btn.reveal  .option-letter{background:#a5d6a7;color:#2e7d32;}

  .result-msg {
    text-align:center;
    font-size:1rem;
    font-weight:800;
    padding:13px;
    border-radius:14px;
    margin-bottom:16px;
    display:none;
  }
  .result-msg.correct{background:#e8f5e9;color:#388e3c;border:1.5px solid #a5d6a7;display:block;}
  .result-msg.wrong  {background:#fce4ec;color:#c62828;border:1.5px solid #f48fb1;display:block;}

  .explanation {
    font-size:0.88rem;
    color:var(--txt2);
    background:var(--surface2);
    border-radius:12px;
    padding:12px 16px;
    margin-bottom:20px;
    line-height:1.65;
    display:none;
    border-left:3px solid var(--accent1);
  }

  .modal-actions{display:flex;gap:10px;flex-wrap:wrap;}

  .btn-next,.btn-restart {
    flex:1;
    padding:13px 18px;
    border:none;
    border-radius:16px;
    font-family:'Nunito',sans-serif;
    font-size:0.95rem;
    font-weight:800;
    cursor:pointer;
    transition:all 0.2s;
    min-width:120px;
    display:none;
  }
  .btn-next {
    background:linear-gradient(135deg,#7986cb,#64b5f6);
    color:#fff;
    box-shadow:0 4px 16px rgba(121,134,203,0.35);
  }
  .btn-next:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(121,134,203,0.45);}
  .btn-restart {
    background:linear-gradient(135deg,#ce93d8,#9575cd);
    color:#fff;
    box-shadow:0 4px 16px rgba(149,117,205,0.35);
  }
  .btn-restart:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(149,117,205,0.45);}

  /* Confetti */
  .confetti-piece {
    position:fixed;
    top:-20px;
    border-radius:2px;
    animation:confettiFall linear forwards;
    pointer-events:none;
    z-index:200;
  }
  @keyframes confettiFall{to{transform:translateY(110vh) rotate(720deg);opacity:0;}}

  @media(max-width:500px){
    .options-grid{grid-template-columns:1fr;}
    .wheel-glow,.wheel-ring{width:280px;height:280px;}
  }
</style>
</head>
<body>

<div class="blobs">
  <div class="blob blob1"></div>
  <div class="blob blob2"></div>
  <div class="blob blob3"></div>
  <div class="blob blob4"></div>
</div>
<div id="sparklesContainer"></div>

<div class="game-container">

  <div class="header">
    <h1>☽ <span>Prayer Knowledge Wheel</span></h1>
    <p>Spin · Answer · Learn</p>
  </div>

  <div class="score-bar">
    <div class="score-item">
      <div class="score-label">Round</div>
      <div class="score-val" id="roundVal">0</div>
    </div>
    <div class="score-item">
      <div class="score-label">Correct</div>
      <div class="score-val correct" id="correctVal">0</div>
    </div>
    <div class="score-item">
      <div class="score-label">Wrong</div>
      <div class="score-val wrong" id="wrongVal">0</div>
    </div>
  </div>

  <div class="wheel-section">
    <div class="wheel-wrapper">
      <div class="wheel-glow"></div>
      <div class="wheel-ring"></div>
      <canvas id="wheel" width="300" height="300"></canvas>
      <div class="pointer"></div>
      <div class="wheel-hub">☽</div>
    </div>
    <div class="topic-display" id="topicDisplay">Spin the wheel to begin!</div>
    <button class="spin-btn" id="spinBtn" onclick="spinWheel()">✦ SPIN ✦</button>
  </div>

  <div class="legend" id="legend"></div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-topic-badge" id="modalBadge">Topic</div>
    <h2 id="modalQuestion"></h2>
    <div class="options-grid" id="optionsGrid"></div>
    <div class="result-msg" id="resultMsg"></div>
    <div class="explanation" id="explanation"></div>
    <div class="modal-actions">
      <button class="btn-next"    id="btnNext"    onclick="closeModal()">Spin Again ↺</button>
      <button class="btn-restart" id="btnRestart" onclick="restartGame()">↺ Restart Game</button>
    </div>
  </div>
</div>

<script>
// ─── SEGMENTS ────────────────────────────────────────────────────────────────
const segments = [
  {
    label: "Conditions\nof Prayer",
    fill: "#dce8fb", stroke: "#90caf9", text: "#2a4a7f",
    badge: "linear-gradient(135deg,#90caf9,#64b5f6)",
    questions: [
      { q:"What is one of the essential conditions (Shurut) for the validity of prayer?", options:["Facing the Qibla (direction of Mecca)","Smiling during prayer","Reading in a loud voice always","Wearing white clothes"], answer:0, exp:"Facing the Qibla is one of the essential conditions for prayer to be valid. If unable, one should face the direction as best they can." },
      { q:"Which of the following is NOT a condition (Shart) for prayer?", options:["Purity from minor/major impurity","Covering the Awrah","Raising the hands at Takbir","Entering the prayer time"], answer:2, exp:"Raising the hands at Takbir is a Sunnah, not a condition. Conditions include purity, covering Awrah, and being in the correct prayer time." },
      { q:"What must be removed before prayer for it to be valid?", options:["Rings and watches","Ritual impurity (Najasa) from body, clothes and place","Shoes","Hat or cap"], answer:1, exp:"Removing ritual impurity (Najasa) from body, clothes, and place of prayer is an essential condition for the prayer to be valid." }
    ]
  },
  {
    label: "Obligatory\nActs (Wajibat)",
    fill: "#ede0fb", stroke: "#b39ddb", text: "#4a2a7f",
    badge: "linear-gradient(135deg,#b39ddb,#9575cd)",
    questions: [
      { q:"What is a Wajib (obligatory act) that if forgotten must be compensated by a prostration of forgetfulness?", options:["Surah Al-Fatiha","The first Tashahhud (in 3 or 4 rak'ah prayers)","Saying Bismillah silently","Raising the hands at Takbir"], answer:1, exp:"The first Tashahhud is Wajib. If forgotten, it must be compensated by Sujud al-Sahw (prostration of forgetfulness) at the end of prayer." },
      { q:"Which Takbir is considered Wajib (obligatory) in prayer?", options:["Only the opening Takbir","All transitional Takbirs during prayer","The Takbir of the final sitting only","None — all Takbirs are just Sunnah"], answer:1, exp:"All transitional Takbirs (said when moving between positions) are Wajib. Missing one intentionally invalidates the prayer." },
      { q:"Saying 'Subhana Rabbiyal Adheem' in Ruku is considered:", options:["Rukn (pillar)","Wajib (obligatory)","Sunnah (recommended)","Mubah (permissible)"], answer:2, exp:"'Subhana Rabbiyal Adheem' in Ruku is a confirmed Sunnah. The Wajib is the bowing itself and remaining still within it." }
    ]
  },
  {
    label: "Sunnah\nActs",
    fill: "#ddf5e7", stroke: "#a5d6a7", text: "#1b5e3a",
    badge: "linear-gradient(135deg,#a5d6a7,#66bb6a)",
    questions: [
      { q:"Which of these is a Sunnah of prayer?", options:["Covering the Awrah","Raising hands at the opening Takbir","Reciting Surah Al-Fatiha","Prostrating on the ground"], answer:1, exp:"Raising the hands at the opening Takbir (and other positions) is a confirmed Sunnah. Covering the Awrah and Al-Fatiha are conditions/pillars." },
      { q:"Reciting the opening supplication (Du'a al-Istiftah) before Al-Fatiha is:", options:["A pillar of prayer","An obligatory act (Wajib)","A Sunnah of prayer","Forbidden"], answer:2, exp:"Du'a al-Istiftah is a Sunnah. It is recommended but omitting it does not invalidate the prayer." },
      { q:"Saying Ameen after Al-Fatiha is considered:", options:["A condition of prayer","A pillar of prayer","Sunnah","Disliked"], answer:2, exp:"Saying 'Ameen' after Al-Fatiha is a confirmed Sunnah. In congregation it should be said aloud, along with the Imam." }
    ]
  },
  {
    label: "Disliked\nActs (Makruhat)",
    fill: "#fde8ef", stroke: "#f48fb1", text: "#7f2a4a",
    badge: "linear-gradient(135deg,#f48fb1,#e57399)",
    questions: [
      { q:"Which of the following is considered Makruh (disliked) in prayer?", options:["Reciting Surah Al-Ikhlas after Al-Fatiha","Frequently shifting eyes or looking around","Saying Ameen quietly","Making long prostrations"], answer:1, exp:"Shifting eyes and looking around during prayer is Makruh. The worshipper should fix their gaze on the place of prostration." },
      { q:"Praying while wearing clothes with distracting drawings or pictures is considered:", options:["Sunnah","Obligatory to avoid","Makruh (disliked)","It nullifies the prayer"], answer:2, exp:"Wearing clothes with distracting images is Makruh during prayer because it can divert attention away from worship." },
      { q:"What is the ruling on cracking the fingers or interlacing them during prayer?", options:["Sunnah","Wajib to avoid","Makruh (disliked)","It nullifies prayer"], answer:2, exp:"Cracking or interlacing fingers during prayer is Makruh as it is a distraction from the reverence required in prayer." }
    ]
  },
  {
    label: "Virtues\nof Prayer",
    fill: "#fff8dc", stroke: "#ffe082", text: "#6d5000",
    badge: "linear-gradient(135deg,#ffe082,#ffca28)",
    questions: [
      { q:"According to the Quran, what does prayer prevent the believer from?", options:["Forgetting Allah","Fahsha (indecency) and Munkar (evil)","Being poor","Having bad friends"], answer:1, exp:"Allah says: 'Indeed, prayer prohibits immorality and wrongdoing.' (Quran 29:45). This is one of the greatest virtues of prayer." },
      { q:"The Prophet ﷺ compared prayer to:", options:["A fortress of iron","A flowing river in which a person bathes five times a day","A key to the heavens","A shield from illness"], answer:1, exp:"The Prophet ﷺ used the analogy of bathing five times a day in a river — no dirt would remain. Likewise the five prayers cleanse sins. (Bukhari & Muslim)" },
      { q:"Prayer is described in the Quran as being prescribed at:", options:["Any convenient time","Specific, fixed times upon the believers","Once a day at noon","Whenever one feels spiritually weak"], answer:1, exp:"Allah says: 'Indeed, prayer has been decreed upon the believers at specified times.' (Quran 4:103)." }
    ]
  },
  {
    label: "Ruling on\nAbandoning Prayer",
    fill: "#dff5f8", stroke: "#80deea", text: "#1a5c65",
    badge: "linear-gradient(135deg,#80deea,#4dd0e1)",
    questions: [
      { q:"What is the ruling on one who abandons prayer out of laziness while believing in its obligation?", options:["They are a disbeliever (Kafir)","They are a grave sinner (Fasiq) but not a disbeliever","It is only slightly disliked","There is no punishment"], answer:1, exp:"According to the majority of scholars, abandoning prayer out of laziness while believing in its obligation makes one a grave sinner who must repent and make up missed prayers." },
      { q:"What is the ruling on someone who denies that prayer is obligatory?", options:["They are a grave sinner only","They become an apostate (disbeliever)","Their prayer is just invalid","They must pay a fine"], answer:1, exp:"Denying the obligation of prayer — a matter of unanimous agreement — is considered apostasy by scholars." },
      { q:"The Prophet ﷺ said: 'The covenant that separates us from them is ___'.", options:["Fasting in Ramadan","Paying Zakat","Prayer","Performing Hajj"], answer:2, exp:"The Prophet ﷺ said: 'The covenant that separates us from them is the prayer; whoever abandons it has committed disbelief.' (Ahmad, Tirmidhi)." }
    ]
  }
];

// ─── WHEEL ───────────────────────────────────────────────────────────────────
const canvas = document.getElementById('wheel');
const ctx = canvas.getContext('2d');
const NUM = segments.length;
const ARC = (2*Math.PI)/NUM;
let currentAngle=0, spinning=false;
let score={round:0,correct:0,wrong:0};

function drawWheel(angle){
  ctx.clearRect(0,0,300,300);
  const cx=150,cy=150,r=145;

  for(let i=0;i<NUM;i++){
    const start=angle+i*ARC-Math.PI/2;
    const end=start+ARC;
    const s=segments[i];

    // Fill
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,start,end);
    ctx.closePath();
    ctx.fillStyle=s.fill;
    ctx.fill();

    // Divider
    ctx.strokeStyle='rgba(255,255,255,0.8)';
    ctx.lineWidth=2.5;
    ctx.stroke();

    // Accent arc
    ctx.beginPath();
    ctx.arc(cx,cy,r-3,start,end);
    ctx.strokeStyle=s.stroke;
    ctx.lineWidth=4;
    ctx.globalAlpha=0.55;
    ctx.stroke();
    ctx.globalAlpha=1;

    // Horizontal text
    const midAngle=start+ARC/2;
    const textR=r*0.66;
    const tx=cx+Math.cos(midAngle)*textR;
    const ty=cy+Math.sin(midAngle)*textR;
    const lines=s.label.split('\n');
    ctx.save();
    ctx.translate(tx,ty);
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillStyle=s.text;
    ctx.font='bold 10.5px Nunito, sans-serif';
    ctx.shadowColor='rgba(255,255,255,0.8)';
    ctx.shadowBlur=4;
    const lineH=13;
    lines.forEach((line,li)=>{
      const oy=(li-(lines.length-1)/2)*lineH;
      ctx.fillText(line,0,oy);
    });
    ctx.restore();
  }

  // Inner shadow
  ctx.beginPath();
  ctx.arc(cx,cy,32,0,2*Math.PI);
  ctx.fillStyle='rgba(255,255,255,0.6)';
  ctx.fill();
}

// Legend
function buildLegend(){
  const leg=document.getElementById('legend');
  leg.innerHTML='';
  segments.forEach(s=>{
    leg.innerHTML+=`<div class="legend-item"><div class="legend-dot" style="background:${s.stroke}"></div>${s.label.replace('\n',' ')}</div>`;
  });
}

// ─── SPIN ────────────────────────────────────────────────────────────────────
function spinWheel(){
  if(spinning)return;
  spinning=true;
  document.getElementById('spinBtn').disabled=true;
  document.getElementById('topicDisplay').textContent='Spinning...';

  const totalSpin=1440+Math.random()*1080;
  const duration=4000+Math.random()*1000;
  const start=performance.now();
  const startAngle=currentAngle;

  function animate(now){
    const elapsed=now-start;
    const progress=Math.min(elapsed/duration,1);
    const ease=1-Math.pow(1-progress,3);
    currentAngle=startAngle+(totalSpin*Math.PI/180)*ease;
    drawWheel(currentAngle);
    if(progress<1){
      requestAnimationFrame(animate);
    } else {
      spinning=false;
      const norm=((-currentAngle%(2*Math.PI))+2*Math.PI)%(2*Math.PI);
      const idx=Math.floor((norm/(2*Math.PI))*NUM)%NUM;
      const selected=segments[idx];
      document.getElementById('topicDisplay').textContent='✦ '+selected.label.replace('\n',' ')+' ✦';
      setTimeout(()=>openQuestion(selected),600);
    }
  }
  requestAnimationFrame(animate);
}

// ─── QUESTION ────────────────────────────────────────────────────────────────
let answered=false;

function openQuestion(seg){
  const pool=seg.questions;
  const q=pool[Math.floor(Math.random()*pool.length)];

  document.getElementById('modalBadge').textContent=seg.label.replace('\n',' ');
  document.getElementById('modalBadge').style.background=seg.badge;
  document.getElementById('modalQuestion').textContent=q.q;

  const grid=document.getElementById('optionsGrid');
  grid.innerHTML='';
  ['A','B','C','D'].forEach((letter,i)=>{
    const btn=document.createElement('button');
    btn.className='option-btn';
    btn.innerHTML=`<span class="option-letter">${letter}</span>${q.options[i]}`;
    btn.onclick=()=>handleAnswer(i,q.answer,q.exp,q.options);
    grid.appendChild(btn);
  });

  document.getElementById('resultMsg').className='result-msg';
  document.getElementById('resultMsg').textContent='';
  document.getElementById('explanation').style.display='none';
  document.getElementById('btnNext').style.display='none';
  document.getElementById('btnRestart').style.display='none';
  answered=false;

  score.round++;
  updateScore();
  document.getElementById('modalOverlay').classList.add('active');
}

function handleAnswer(chosen,correct,exp,options){
  if(answered)return;
  answered=true;
  document.querySelectorAll('.option-btn').forEach((btn,i)=>{
    btn.disabled=true;
    if(i===correct)btn.classList.add('correct');
    if(i===chosen&&chosen!==correct)btn.classList.add('wrong');
  });
  
  const rEl=document.getElementById('resultMsg');
  document.getElementById('explanation').textContent=exp;
  document.getElementById('explanation').style.display='block';
  
  if(chosen===correct){
    score.correct++;
    rEl.textContent='✓ Correct! Well done!';
    rEl.className='result-msg correct';
    launchConfetti();
  } else {
    score.wrong++;
    rEl.textContent='✗ Incorrect. Correct answer: '+options[correct];
    rEl.className='result-msg wrong';
  }
  
  updateScore();
  
// ─── منطق فحص النسبة وحفظ النجاح داخل دالة handleAnswer ───
  if (score.round > 0) {
    const percentage = (score.correct / score.round) * 100;
    
    // إذا حقق نسبة 50% أو أكثر بعد الإجابة على سؤالين على الأقل
    if (percentage >= 50 && score.round >= 2) {
      
      const nextBtn = document.getElementById('btnNext');
      nextBtn.textContent = "✓ Return to Lesson 1";
      
      // عند الضغط على الزر، نعود لصفحة الدرس ونخبره عبر الرابط أننا نجحنا!
      nextBtn.onclick = function() {
          window.location.href = "../lesson1.html?passed=true"; 
      };
    }
  }
  
  document.getElementById('btnNext').style.display='flex';
  document.getElementById('btnRestart').style.display='flex';
}

function closeModal(){
  document.getElementById('modalOverlay').classList.remove('active');
  document.getElementById('spinBtn').disabled=false;
}

function restartGame(){
  score={round:0,correct:0,wrong:0};
  updateScore();
  closeModal();
  document.getElementById('topicDisplay').textContent='Spin the wheel to begin!';
}

function updateScore(){
  document.getElementById('roundVal').textContent=score.round;
  document.getElementById('correctVal').textContent=score.correct;
  document.getElementById('wrongVal').textContent=score.wrong;
}

// ─── CONFETTI ────────────────────────────────────────────────────────────────
function launchConfetti(){
  const colors=['#b39ddb','#90caf9','#a5d6a7','#f48fb1','#ffe082','#80deea','#ce93d8','#fff'];
  for(let i=0;i<55;i++){
    const el=document.createElement('div');
    el.className='confetti-piece';
    const size=6+Math.random()*8;
    el.style.cssText=`left:${Math.random()*100}vw;background:${colors[Math.floor(Math.random()*colors.length)]};width:${size}px;height:${size}px;border-radius:${Math.random()>0.5?'50%':'3px'};animation-duration:${2+Math.random()*2}s;animation-delay:${Math.random()*0.4}s;`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),4500);
  }
}

// ─── SPARKLES ────────────────────────────────────────────────────────────────
function buildSparkles(){
  const c=document.getElementById('sparklesContainer');
  const emojis=['✦','✧','⋆','·','✿','❋'];
  for(let i=0;i<18;i++){
    const el=document.createElement('div');
    el.className='sparkle';
    el.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    el.style.cssText=`left:${Math.random()*100}vw;bottom:${-5+Math.random()*10}vh;color:hsl(${Math.random()*360},60%,70%);font-size:${0.7+Math.random()*0.8}rem;animation-duration:${8+Math.random()*10}s;animation-delay:${Math.random()*10}s;`;
    c.appendChild(el);
  }
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
buildSparkles();
buildLegend();
drawWheel(0);
</script>
