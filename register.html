<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Muslim</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="main-wrapper">
    <div class="container">
        <div class="form-section">
            <h1 class="form-title">Create an account</h1>
            <form form id="signupForm">
                <div class="input-group">
                    <label>Full name*</label>
                    <div class="input-wrapper">
                        <img src="image/person.svg" class="field-icon">
                        <input type="text" placeholder="Enter your Full name" required id="fullNameInput">
                    </div>
                </div>

                <div class="input-group">
                    <label>Email*</label>
                    <div class="input-wrapper">
                        <img src="image/email.svg" class="field-icon">
                        <input type="email" placeholder="Enter your Email" required>
                    </div>
                </div>

                <div class="row">
                    <div class="input-group">
                        <label>Country</label>
                        <div class="input-wrapper select-wrapper">
                            <img src="image/country.svg" class="field-icon">
                               <input type="text" value="palestine">
                             
                        </div>
                    </div>
                    <div class="input-group">
                        <label> City</label>
                        <div class="input-wrapper select-wrapper">
                            <input type="text" value="Qalqilya">
                        </div>
                    </div>
                </div>

                <div class="input-group">
                    <label>Password*</label>
                    <div class="input-wrapper">
                        <img src="image/password.svg" class="field-icon">
                        <input type="password" id="passwordInput"  placeholder="Enter your password" required>
                        <img src="image/eye.svg" class="eye-icon" id="togglePassword">
                        <div id="passwordError" class="validation-message"></div>
                    </div>
                    <small class="hint">At least 8 characters</small>
                </div>

                <div class="input-group">
                    <label>Confirm Password*</label>
                    <div class="input-wrapper">
                        <img src="image/password.svg" class="field-icon">
                        <input type="password"  id="confirmPasswordInput" placeholder="Confirm your password" required>
                        <img src="image/eye.svg" class="eye-icon"  id="toggleConfirmPassword">
                         <div id="confirmError" class="validation-message"></div>
                    </div>
                </div>

                <button type="submit" class="btn-signup">Sign up</button>

                <p class="login-text">Already have an account? <a href="login.html">Login</a></p>

                <div class="divider">
                    <span>Or</span>
                </div>

                <button type="button" class="btn-google" id="googleBtn">
                    <img src="image/Social media logo.svg" alt="google">
                    Continue with Google
                </button>
            </form>
             <p class="security-note">For your security, do not share your password with anyone.</p>
        </div>

        <div class="brand-section">
    <div class="brand-header">
        <img src="image/logo.svg" class="logo" alt="Logo">
        <img src="image/Where new hearts find guidance and warmth.svg" class="slogan" alt="Slogan">
    </div>

    <div class="hero-wrapper">
        <div class="hero-content">
            <img src="image/shaikh.png" class="hero-character" alt="Shaikh character">
            <img src="image/ظل.png" class="background-shape" alt="Shadow">
        </div>
    </div>
</div>
    </div>
</div>
<script src="js/register.js"></script>
<script src="js/login.js"></script>

</body>
</html>
