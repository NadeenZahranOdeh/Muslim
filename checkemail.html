<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Your Email</title>
    <link rel="stylesheet" href="css/checkemail.css">
</head>
<body>

    <div class="container">
        <div class="login-section">
            <div class="card">
                <h1 class="main-title">Check your email</h1>
                
                <div class="spacer-32"></div> <p class="sub-title">
                    We have sent a password reset link to your email. Please check your inbox.
                </p>
                
                <div class="spacer-32"></div> <a href="login.html" class="btn-primary-link">
    <button class="btn-primary">Back to Login</button>
</a>
                
                <p class="resend-text">Didn’t receive the email? <span class="resend-link">Resend link</span></p>
            </div>
        </div>

        <div class="brand-section">

            <div class="brand-header">
                <img src="image/logo.svg" class="logo">
                <img src="image/Where new hearts find guidance and warmth.svg" class="slogan">
            </div>

            <div class="hero-scene">
              <img src="image/ظل.png" class="shadow">
              <img src="image/shaikh.png" class="hero-character">
            </div>
            <div class="bottom-shape">
                      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 607 415" fill="none">
                      <path d="M90.9318 266C-0.268211 291.6 -5.73488 380.667 2.93179 422H606.932V0H571.342C523.061 0 485.698 40.3228 462.565 82.7016C393.976 208.353 186.701 239.117 90.9318 266Z" fill="#CBC5AF"/>
                      </svg>
                 </div>
        </div>
    </div>

</body>
</html>
