<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muslim Portal - Change Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Serif:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/changepassword.css">
</head>
<body>

    <div class="split-container">
        <main class="form-side">
            <div class="form-wrapper">
                <header class="header-content">
                    <h1>Change Password</h1>
                    <p>Please enter a new secure password to protect your account!</p>
                </header>

                <form id="changePasswordForm" class="password-form" onsubmit="handleFormSubmit(event)">
                    
                    <div class="input-group">
                        <label for="newPassword">Password*</label>
                        <div class="input-with-icons">
                            <img src="image/password.svg" class="mask-icon" alt="Mask">
                            <input type="password" id="newPassword" required placeholder="Enter new password">
                            <img id="toggleNewPassword" src="image/eye.svg" class="eye-icon" alt="Toggle Visibility">
                        </div>
                        <p class="validation-msg success-msg" id="validationLength">Must be at least 8 characters and include letters and numbers</p>
                    </div>

                    <div class="input-group">
                        <label for="confirmPassword">Confirm Password*</label>
                        <div class="input-with-icons">
                            <img src="image/password.svg" class="mask-icon" alt="Mask">
                            <input type="password" id="confirmPassword" required placeholder="Re-enter your password">
                            <img id="toggleConfirmPassword" src="image/eye.svg" class="eye-icon" alt="Toggle Visibility">
                        </div>
                        <p class="validation-msg error-msg" id="validationMatch">Must match the new password</p>
                    </div>

                    <button type="submit" class="submit-btn" id="updateBtn">Update Password</button>
                    
                    <footer class="form-footer">
                        <p>For your security, do not share your password with anyone</p>
                    </footer>
                </form>
            </div>
        </main>

        <div class="brand-section">
            <div class="brand-header">
                <img src="image/logo.svg" class="logo">
                <img src="image/Where new hearts find guidance and warmth.svg" class="slogan">
            </div>

            <div class="hero-scene">
                 <div class="bottom-shape">
                      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 607 415" fill="none">
                      <path d="M90.9318 266C-0.268211 291.6 -5.73488 380.667 2.93179 422H606.932V0H571.342C523.061 0 485.698 40.3228 462.565 82.7016C393.976 208.353 186.701 239.117 90.9318 266Z" fill="#CBC5AF"/>
                      </svg>
                 </div>
           <img src="image/ظل.png" class="shadow">
           <img src="image/changepass.png" class="hero-character">

             </div>

        </div>
    </div>

    <script src="js/changepassword.js"></script>
</body>
</html>
