<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Password Changed</title>
<link rel="stylesheet" href="css/pass.css">
</head>

<body>

<div class="main-wrapper">
    <div class="container">

        <div class="form-section">
             <div class="title-wrapper">
                <img src="image/circul.svg" class="success-icon" alt="success">
                  <h1 class="title">Password changed!</h1>
               </div>
            <p class="subtitle">
                Your password has been changed successfully.
                You can now log in using your new password.
            </p>

            <a href="login.html" class="btn-primary">Log in now</a>

            <p class="support-text">
                Didn’t request this change?
                <a href="#">Contact support immediately</a>
            </p>
        </div>

       
        <div class="brand-section">

            <div class="brand-header">
                <img src="image/logo.svg" class="logo">

            </div>

            <div class="hero-scene">
              <img src="image/ظل.png" class="shadow">
              <img src="image/changepass.png" class="hero-character">
            </div>
            <div class="bottom-shape">
                      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 607 415" fill="none">
                      <path d="M90.9318 266C-0.268211 291.6 -5.73488 380.667 2.93179 422H606.932V0H571.342C523.061 0 485.698 40.3228 462.565 82.7016C393.976 208.353 186.701 239.117 90.9318 266Z" fill="#CBC5AF"/>

        </div>
</div>
