
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login-Muslim</title>
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

<div class="main-wrapper">
    <div class="container">
        <div class="form-section">
            <h1 class="form-title">Welcome back!</h1>
            <p class="form-subtitle">We are happy to have you back</p>
            <form id="loginForm">
                <div class="input-group">
                    <label>Email*</label>
                    <div class="input-wrapper">
                        <img src="image/email.svg" class="field-icon">
                        <input type="email" placeholder="Enter your Email" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Password*</label>
                    <div class="input-wrapper">
                        <img src="image/password.svg" class="field-icon">
                        <input type="password" id="passwordInput" placeholder="Enter your password" required>
                        <img src="image/eye.svg" class="eye-icon" id="togglePassword">
                        
                    </div>
                    <small class="hint"><a href="forgotpassword.html">Forgot password?</a></small>
                </div>

                <button type="submit" class="btn-primary"><a href="index.html">Log in</a></button>

                <div class="divider">
                    <span>Or</span>
                </div>

                <button type="button" class="btn-google" id="googleBtn">
                    <img src="image/Social media logo.svg" alt="google">
                    Continue with Google
                </button>
                <p class="footer-text">
                     Don't have an account? <a href="register.html">Sign up</a>
                </p>
            </form>
        </div>

        <div class="brand-section">

            <div class="brand-header">
                <img src="image/logo.svg" class="logo">
                <img src="image/Where new hearts find guidance and warmth.svg" class="slogan">
            </div>

            <div class="hero-scene">
                 <div class="bottom-shape">
                      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 607 415" fill="none">
                      <path d="M90.9318 266C-0.268211 291.6 -5.73488 380.667 2.93179 422H606.932V0H571.342C523.061 0 485.698 40.3228 462.565 82.7016C393.976 208.353 186.701 239.117 90.9318 266Z" fill="#CBC5AF"/>
                      </svg>
                 </div>
           <img src="image/ظل.png" class="shadow">
           <img src="image/changepass.png" class="hero-character">

             </div>

        </div>
    </div>
</div>
<script src="js/login.js"></script>
</body>
</html>
