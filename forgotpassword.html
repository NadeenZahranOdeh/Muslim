<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Muslim</title>
    <link rel="stylesheet" href="css/forgotpassword.css">
</head>
<body>

<div class="main-wrapper">
    <div class="container">
        
        <div class="form-section">
            <h1 class="form-title">Forgot Password</h1>
            <p class="form-subtitle">Enter your email and we will send you a link to reset your password</p>
            
            <form id="forgotPasswordForm">
                <div class="input-group">
                    <label>Email*</label>
                    <div class="input-wrapper">
                        <img src="image/email.svg" class="field-icon" alt="email icon">
                        <input type="email" placeholder="Enter your Email" required>
                    </div>
                </div>

                <button type="submit" class="btn-primary"><a href="checkemail.html">Reset Password</a></button>
                <p class="footer-hint">Make sure to check your spam folder!</p>
                <p class="back-to-login"><a href="login.html">← Back to Login</a></p>
            </form>
        </div>

        <div class="brand-section">

            <div class="brand-header">
                <img src="image/logo.svg" class="logo">
                <img src="image/Where new hearts find guidance and warmth.svg" class="slogan">
            </div>

            <div class="hero-scene">
              <img src="image/ظل.png" class="shadow">
              <img src="image/forgotpass.png" class="hero-character">
            </div>
            <div class="bottom-shape">
                      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 607 415" fill="none">
                      <path d="M90.9318 266C-0.268211 291.6 -5.73488 380.667 2.93179 422H606.932V0H571.342C523.061 0 485.698 40.3228 462.565 82.7016C393.976 208.353 186.701 239.117 90.9318 266Z" fill="#CBC5AF"/>
                      </svg>
                 </div>
        </div>

    </div>
</div>

<script src="js/forgotpassword.js"></script>
</body>
</html>
