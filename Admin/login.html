<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muslim Portal - Admin Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Serif:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <div class="admin-login-container">
        
        <div class="sheikh-welcome-side">
             <div class="welcome-bubble">
                <h3>Assalamu Alaikum</h3>
                <p>Welcome to the Management Center</p>
            </div>
            <img src="../image/sheikh-leftstep1.svg" alt="Welcome Sheikh" class="floating-sheikh">
        </div>

        <div class="login-card-side">
            <div class="login-card">
                <div class="card-header">
                    <img src="../image/logo.svg" alt="Muslim Logo" class="card-logo">
                    <h2>Admin Portal</h2>
                    <p>Enter your administrator credentials to securely manage the sanctuary.</p>
                </div>

                <div class="error-banner" id="errorBanner">
                    ❌ Invalid username or password. Please try again.
                </div>

                <form id="adminLoginForm" onsubmit="handleAdminLogin(event)">
                    <div class="input-group">
                        <label for="adminUsername">Username or Email</label>
                        <input type="text" id="adminUsername" required placeholder="admin_nadeen">
                    </div>

                    <div class="input-group">
                        <label for="adminPassword">Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="adminPassword" required placeholder="••••••••">
                            <img src="../image/eye-open.svg" class="toggle-password-eye" id="togglePasswordBtn" onclick="togglePasswordVisibility()" alt="Toggle Visibility">
                        </div>
                    </div>

                    <button type="submit" class="login-submit-btn">Secure Login →</button>
                </form>

                <div class="card-footer">
                    <a href="../index.html" class="back-to-site">← Back to Main Website</a>
                </div>
            </div>
        </div>

    </div>

    <script src="js/login.js"></script>
</body>
</html>
